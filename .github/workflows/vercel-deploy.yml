name: vercel-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: has_secrets
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy when Vercel secrets are missing
        if: steps.has_secrets.outputs.ok != 'true'
        run: echo "Skipping Vercel deploy (missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID)."

      - name: Setup Node
        if: steps.has_secrets.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.has_secrets.outputs.ok == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        if: steps.has_secrets.outputs.ok == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        if: steps.has_secrets.outputs.ok == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.has_secrets.outputs.ok == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
